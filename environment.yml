# =============================================================================
# Golf Multi-View Pipeline (wizard) 的 conda 环境.
#
# 这里只装 conda 才能装好的: python, PyTorch + CUDA, pytorch3d.
# 其余 pip 包统一在 requirements.txt 里维护, 这里通过 `-r requirements.txt`
# 一并装上.
#
# 用法:
#   conda env create -f environment.yml
#   conda activate golf_pipeline
#
# PyTorch 2.1 + CUDA 11.8 (跟 HaMER / Hand_Estimation 同栈).
#
# 注意: torchgeometry 在新版 PyTorch 下有个 bool tensor bug
# (`1 - mask`), 项目内通过 lib/utils/_torchgeometry_patch.py 运行时 monkey-patch
# 修复, 不需要手动改 site-packages.
#
# 警告: model/sam2/ 的 setup.py 写了 torch>=2.5.1, 如果直接
# `pip install -e model/sam2/` 会把 torch 升到 2.12+cu130, 老 NVIDIA 驱动
# 会 CUDA init 失败. 务必加 --no-deps:
#     pip install -e model/sam2/ --no-deps
# (sam2 的 runtime 跟 torch 2.1.2 兼容, setup.py 那个版本号是 SAM2 团队
# 保守起见写的, 实际用不到 2.5+ 特性.)
# =============================================================================

name: golf_pipeline

channels:
  - pytorch
  - nvidia
  - pytorch3d
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  # chumpy build 时 (在 --no-build-isolation 下) 要用当前 env 的 setuptools/wheel.
  # setuptools 必须 <70: 81+ 删了 pkg_resources, 而 PyTorch 2.1.2 的 cpp_extension
  # 还在 import pkg_resources, 否则 pytorch3d 源码编译会 fail.
  - setuptools<70
  - wheel

  # ── PyTorch + CUDA (conda 必装, pip 装 pytorch3d 太折腾) ──────────────
  - pytorch=2.1.2
  - torchvision=0.16.2
  - torchaudio=2.1.2
  - pytorch-cuda=11.8
  - pytorch3d
